<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cortex</title>
  <link rel="stylesheet" href="/vendor/fonts.css" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-mark">◧</span> Cortex</div>
    <nav class="seg" role="tablist">
      <button class="seg-btn seg-btn--on" data-view="editor">Editor</button>
      <button class="seg-btn" data-view="graph">Graph</button>
    </nav>
    <div class="topbar-spacer"></div>
    <div id="status" class="status status--unknown">connecting…</div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="search">
        <input id="q" type="search" placeholder="Search your mind…" autocomplete="off" spellcheck="false" />
        <div class="search-mode">
          <button data-mode="semantic" class="chip chip--on">semantic</button>
          <button data-mode="hybrid" class="chip">hybrid</button>
          <button data-mode="ask" class="chip chip--ask">ask ✦</button>
        </div>
      </div>
      <div id="list" class="list" aria-label="results"><div class="empty">Loading vault…</div></div>
    </aside>

    <section class="main">
      <!-- Editor -->
      <div id="editorPanel" class="panel">
        <div class="editor-head">
          <div id="path" class="path">No note open</div>
          <div class="editor-actions">
            <span id="dirty" class="dirty" hidden>●</span>
            <button id="save" class="btn" disabled>Save</button>
          </div>
        </div>
        <div id="editor" class="editor-host"></div>
        <div id="viewer" class="viewer" hidden></div>
        <div id="editorHint" class="editor-hint">Open a note from the left, or search to find one.</div>
        <div id="toast" class="toast" hidden></div>
      </div>

      <!-- Graph -->
      <div id="graphPanel" class="panel" hidden>
        <div class="graph-bar">
          <label class="graph-ctl">color
            <select id="colorBy">
              <option value="folder" selected>folder</option>
              <option value="type">type</option>
              <option value="status">status</option>
              <option value="domain">domain</option>
            </select>
          </label>
          <label class="graph-ctl">labels
            <select id="labelMode">
              <option value="hubs" selected>hubs</option>
              <option value="all">all</option>
              <option value="off">off</option>
            </select>
          </label>
          <button id="relayout" class="btn btn--ghost">re-layout</button>
          <div id="legend" class="legend"></div>
          <div class="graph-meta"><span id="graphMeta"></span></div>
        </div>
        <div id="cy" class="cy"></div>
      </div>
    </section>
  </main>

  <script src="/vendor/cm6.js"></script>
  <script src="/vendor/d3-force.min.js"></script>
  <script src="/vendor/force-graph.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
