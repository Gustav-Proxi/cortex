<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cortex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="cortex.css" />
</head>
<body>
  <div class="app" id="app" data-theme="dark" data-sidebar="on">

    <!-- ===== icon rail ===== -->
    <nav class="rail" aria-label="Primary">
      <div class="rail-mark" title="Cortex">◧</div>
      <button class="rail-btn" data-view="graph" data-on="true" aria-label="Constellation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="6" cy="7" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="17" cy="17" r="2"/><circle cx="8" cy="16" r="2"/><circle cx="12" cy="11" r="2.4" fill="currentColor" stroke="none"/><path d="M8 8.4 10.6 10M13.4 10 16.6 6.8M13.8 12.4 16 15.6M10.2 12.6 9 14.2M14 11h2.2"/></svg>
        <span class="rail-tip">Constellation</span>
      </button>
      <button class="rail-btn" data-view="search" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="6"/><path d="m20 20-3.6-3.6"/></svg>
        <span class="rail-tip">Search · ⌘K</span>
      </button>
      <button class="rail-btn" data-view="library" aria-label="Library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="7" height="7" rx="1.4"/><rect x="13" y="4" width="7" height="7" rx="1.4"/><rect x="4" y="13" width="7" height="7" rx="1.4"/><rect x="13" y="13" width="7" height="7" rx="1.4"/></svg>
        <span class="rail-tip">Library</span>
      </button>
      <button class="rail-btn" data-view="daily" aria-label="Daily">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="5" width="16" height="16" rx="2.4"/><path d="M4 9h16M8 3v4M16 3v4"/><circle cx="12" cy="14.5" r="1.5" fill="currentColor" stroke="none"/></svg>
        <span class="rail-tip">Daily notes</span>
      </button>
      <div class="rail-spacer"></div>
      <button class="rail-btn" id="cmdRailBtn" aria-label="Command palette">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 6H7a2 2 0 1 0 2 2V6Zm0 0h6m0 0v2a2 2 0 1 0 2-2h-2Zm0 0V6m0 12h-6m6 0v-2a2 2 0 1 1 2 2h-2Zm0 0v2m-6-2H7a2 2 0 1 1 2-2v2Zm0 0v2m-6-2H7a2 2 0 1 1 2-2v2Z"/></svg>
        <span class="rail-tip">Command · ⌘K</span>
      </button>
    </nav>

    <!-- ===== sidebar ===== -->
    <aside class="sidebar">
      <div class="side-head">
        <div class="side-title" id="sideTitle">Search</div>
        <div class="side-sub" id="sideSub"></div>
      </div>
      <div class="search">
        <label class="search-field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="6"/><path d="m20 20-3.6-3.6"/></svg>
          <input id="q" type="search" placeholder="Search your mind…" autocomplete="off" spellcheck="false" />
          <span class="search-kbd">⌘K</span>
        </label>
        <div class="search-mode" id="modes">
          <button class="chip" data-mode="semantic" data-on="true">semantic</button>
          <button class="chip" data-mode="hybrid">hybrid</button>
          <button class="chip chip--ask" data-mode="ask">ask ✦</button>
        </div>
      </div>
      <div id="list" class="list" aria-label="results"></div>
    </aside>

    <!-- ===== stage ===== -->
    <main class="stage">
      <header class="topbar">
        <div class="crumbs" id="crumbs">
          <span class="crumb">Vault</span>
          <span class="crumb-sep">/</span>
          <span class="crumb crumb--here">Constellation</span>
        </div>
        <div class="topbar-spacer"></div>
        <div class="seg" id="seg">
          <button class="seg-btn" data-view="graph" data-on="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="6" cy="7" r="1.8"/><circle cx="18" cy="6" r="1.8"/><circle cx="16" cy="17" r="1.8"/><circle cx="12" cy="11" r="2.2" fill="currentColor" stroke="none"/></svg>
            Graph
          </button>
          <button class="seg-btn" data-view="library">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="7" height="7" rx="1.4"/><rect x="13" y="4" width="7" height="7" rx="1.4"/><rect x="4" y="13" width="7" height="7" rx="1.4"/><rect x="13" y="13" width="7" height="7" rx="1.4"/></svg>
            Library
          </button>
        </div>
        <div class="status" id="status">— notes · — chunks</div>
        <button class="icon-btn" id="cmdBtn" aria-label="Command palette">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M9 6H7a2 2 0 1 0 2 2V6Zm0 0h6m0 0v2a2 2 0 1 0 2-2h-2Zm0 0V6m0 12h-6m6 0v-2a2 2 0 1 1 2 2h-2Zm0 0v2m-6-2H7a2 2 0 1 1 2-2v2Zm0 0v2"/></svg>
        </button>
      </header>

      <!-- constellation -->
      <section class="view" id="view-graph">
        <div class="cy" id="cy"></div>
        <div class="graph-controls" id="graphControls"></div>
        <div class="graph-legend" id="legend"></div>
        <div class="graph-meta" id="graphMeta"></div>
        <div class="hovercard" id="hovercard"></div>
      </section>

      <!-- note reader -->
      <section class="view" id="view-note" hidden>
        <div class="reader-wrap">
          <div class="reader" id="reader"></div>
          <div class="aside" id="noteAside"></div>
        </div>
      </section>

      <!-- library -->
      <section class="view" id="view-library" hidden>
        <div class="library" id="library"></div>
      </section>
    </main>

    <!-- ===== command palette ===== -->
    <div class="cmdk-scrim" id="cmdkScrim" data-open="false">
      <div class="cmdk" role="dialog" aria-modal="true">
        <div class="cmdk-field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="6"/><path d="m20 20-3.6-3.6"/></svg>
          <input id="cmdkInput" placeholder="Jump to a note, run a command…" autocomplete="off" spellcheck="false" />
        </div>
        <div class="cmdk-list" id="cmdkList"></div>
        <div class="cmdk-foot">
          <span><span class="k">↑↓</span> navigate</span>
          <span><span class="k">↵</span> open</span>
          <span><span class="k">esc</span> close</span>
        </div>
      </div>
    </div>

    <!-- ===== tweaks ===== -->
    <button class="tw-fab" id="twFab" aria-label="Tweaks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="7" r="2.4"/><path d="M11 7h8M3 7h2.6"/><circle cx="16" cy="17" r="2.4"/><path d="M13 17H3m18 0h-2.6"/></svg>
    </button>
    <div class="tw" id="twPanel" hidden></div>
  </div>

  <script src="graph-engine.js"></script>
  <script src="cortex-app.js"></script>
</body>
</html>
